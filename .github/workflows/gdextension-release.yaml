name: GDExtension Release

on:
  workflow_dispatch:
    branches:
      - main
      
jobs:
  check-version:
    if: github.ref == 'refs/heads/main'
    name: Check version not yet released
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout
        #v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Verify release tag does not exist
        run: |
          VERSION=$(grep '^version=' addon/IDTXFlow/plugin.cfg | sed 's/version="//' | sed 's/"//')
          TAG="v${VERSION}"
          echo "Checking if tag $TAG already exists..."
          if git tag --list | grep -qx "$TAG"; then
            echo "::error::Tag $TAG already exists. Please bump the version in addon/IDTXFlow/plugin.cfg before merging."
            exit 1
          fi
          echo "Tag $TAG does not exist yet. Version is valid."
  
  build:
    if: github.ref == 'refs/heads/main'
    name: Build
    uses: ./.github/workflows/gdextension-build.yaml

  release:
    if: github.ref == 'refs/heads/main'
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        #v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Download all artifacts
        # v8.0.1
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: artifacts

      - name: Create Release Tag
        id: tag
        run: |
          VERSION=$(grep '^version=' addon/IDTXFlow/plugin.cfg | sed 's/version="//' | sed 's/"//')
          TAG="v${VERSION}"
          echo "release_tag=$TAG" >> $GITHUB_OUTPUT
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag $TAG
          git push origin $TAG

      - name: Create GitHub Release
        #v2.6.1
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: Release ${{ steps.tag.outputs.release_tag }}
          files: |
            artifacts/**/gdextension-*.zip
            artifacts/**/idtxflow-sdk-*.zip
